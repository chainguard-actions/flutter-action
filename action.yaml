name: Set up Flutter
description: Setup your runner with Flutter environment
author: Alif Rachmawadi
branding:
  icon: maximize
  color: blue

inputs:
  channel:
    description: The Flutter build release channel
    required: false
    default: stable
  flutter-version:
    description: The Flutter version to make available on the path
    required: false
    default: ""
  flutter-version-file:
    description: The pubspec.yaml file with exact Flutter version defined
    required: false
    default: ""
  architecture:
    description: The architecture of Flutter SDK executable (x64 or arm64)
    required: false
    default: "${{ runner.arch }}"
  cache:
    description: Cache the Flutter SDK
    required: false
    default: "false"
  cache-key:
    description: Identifier for the Flutter SDK cache
    required: false
    default: ""
  cache-path:
    description: Flutter SDK cache path
    required: false
    default: ""
  pub-cache-key:
    description: Identifier for the Dart .pub-cache cache
    required: false
    default: ""
  pub-cache-path:
    description: Flutter pub cache path
    required: false
    default: default
  dry-run:
    description: If true, get outputs but do not install Flutter
    required: false
    default: "false"
  git-source:
    description: Git clone source
    required: false
    default: "https://github.com/flutter/flutter.git"

outputs:
  CHANNEL:
    value: "${{ steps.flutter-action.outputs.CHANNEL }}"
    description: The selected Flutter release channel
  VERSION:
    value: "${{ steps.flutter-action.outputs.VERSION }}"
    description: The selected Flutter version
  ARCHITECTURE:
    value: "${{ steps.flutter-action.outputs.ARCHITECTURE }}"
    description: The selected Flutter CPU architecture
  CACHE-KEY:
    value: "${{ steps.flutter-action.outputs.CACHE-KEY }}"
    description: Key used to cache the Flutter SDK
  CACHE-PATH:
    value: "${{ steps.flutter-action.outputs.CACHE-PATH }}"
    description: Path to Flutter SDK
  PUB-CACHE-KEY:
    value: "${{ steps.flutter-action.outputs.PUB-CACHE-KEY }}"
    description: Key used to cache the pub dependencies
  PUB-CACHE-PATH:
    value: "${{ steps.flutter-action.outputs.PUB-CACHE-PATH }}"
    description: Path to pub cache
  GIT_SOURCE:
    value: "${{ steps.flutter-action.outputs.GIT_SOURCE }}"
    description: Git source of Flutter SDK repository to clone

runs:
  using: composite
  steps:
    # This is a cross-platform composite action that needs yq.
    # It's not preinstalled on Windows runners.
    # See https://github.com/actions/runner-images/issues/7443#issuecomment-1514597691
    - name: Make yq tool available on Windows runners
      if: runner.os == 'Windows'
      run: choco install yq
      shell: bash

    - name: Make setup script executable
      run: chmod +x "$GITHUB_ACTION_PATH/setup.sh"
      shell: bash

    - name: Set action inputs
      id: flutter-action
      shell: bash
      env:
        INPUT_FLUTTER_VERSION: ${{ inputs.flutter-version }}
        INPUT_FLUTTER_VERSION_FILE: ${{ inputs.flutter-version-file }}
        INPUT_ARCHITECTURE: ${{ inputs.architecture }}
        INPUT_CACHE_KEY: ${{ inputs.cache-key }}
        INPUT_CACHE_PATH: ${{ inputs.cache-path }}
        INPUT_PUB_CACHE_KEY: ${{ inputs.pub-cache-key }}
        INPUT_PUB_CACHE_PATH: ${{ inputs.pub-cache-path }}
        INPUT_GIT_SOURCE: ${{ inputs.git-source }}
        INPUT_CHANNEL: ${{ inputs.channel }}
      run: |
        $GITHUB_ACTION_PATH/setup.sh -p \
          -n "$INPUT_FLUTTER_VERSION" \
          -f "$INPUT_FLUTTER_VERSION_FILE" \
          -a "$INPUT_ARCHITECTURE" \
          -k "$INPUT_CACHE_KEY" \
          -c "$INPUT_CACHE_PATH" \
          -l "$INPUT_PUB_CACHE_KEY" \
          -d "$INPUT_PUB_CACHE_PATH" \
          -g "$INPUT_GIT_SOURCE" \
          "$INPUT_CHANNEL"

    - name: Cache Flutter
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      if: ${{ inputs.cache == 'true' }}
      with:
        path: ${{ steps.flutter-action.outputs.CACHE-PATH }}
        key: ${{ steps.flutter-action.outputs.CACHE-KEY }}

    - name: Cache pub dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      if: ${{ inputs.cache == 'true' }}
      with:
        path: ${{ steps.flutter-action.outputs.PUB-CACHE-PATH }}
        key: ${{ steps.flutter-action.outputs.PUB-CACHE-KEY }}-${{ hashFiles('**/pubspec.lock') }}

    - name: Run setup script
      shell: bash
      if: ${{ inputs.dry-run != 'true' && inputs.dry-run != true }}
      env:
        SETUP_VERSION: ${{ steps.flutter-action.outputs.VERSION }}
        SETUP_ARCHITECTURE: ${{ steps.flutter-action.outputs.ARCHITECTURE }}
        SETUP_CACHE_PATH: ${{ steps.flutter-action.outputs.CACHE-PATH }}
        SETUP_PUB_CACHE_PATH: ${{ steps.flutter-action.outputs.PUB-CACHE-PATH }}
        SETUP_CHANNEL: ${{ steps.flutter-action.outputs.CHANNEL }}
      run: |
        $GITHUB_ACTION_PATH/setup.sh \
          -n "$SETUP_VERSION" \
          -a "$SETUP_ARCHITECTURE" \
          -c "$SETUP_CACHE_PATH" \
          -d "$SETUP_PUB_CACHE_PATH" \
          "$SETUP_CHANNEL"
